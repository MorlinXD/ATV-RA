<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editor AR</title>

  <style>
    body { margin:0; display:flex; font-family:sans-serif; }
    #controls {
      width:300px; background:#222; color:white; padding:10px;
    }
    #preview { flex:1; }
    input { width:60px; margin:2px; }
    button { margin-top:5px; }
    .item { cursor:pointer; padding:5px; border-bottom:1px solid #444; }
    .item:hover { background:#444; }
  </style>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>

<div id="controls">
  <h3>Elementos</h3>
  <div id="lista"></div>

  <button onclick="agregar()">➕ Agregar</button>

  <hr>

  <h3>Transformación</h3>

  X: <input id="posX" type="number" step="0.1"><br>
  Y: <input id="posY" type="number" step="0.1"><br>
  Z: <input id="posZ" type="number" step="0.01"><br>

  Escala:
  <input id="scale" type="number" step="0.1" value="1"><br>

  <button onclick="aplicar()">Aplicar</button>

  <hr>

  <button onclick="guardar()">💾 Guardar JSON</button>
</div>

<div id="preview">
  <a-scene embedded>
    <a-camera position="0 0 3"></a-camera>
    <a-entity id="sceneRoot"></a-entity>
  </a-scene>
</div>

<script>

let elementos = [];
let seleccionado = null;
let contador = 0;

// ➕ Agregar elemento
function agregar() {

  const id = "obj" + contador++;

  const obj = document.createElement("a-plane");
  obj.setAttribute("color", "red");
  obj.setAttribute("width", "1");
  obj.setAttribute("height", "1");
  obj.setAttribute("position", "0 0 0");

  obj.setAttribute("id", id);

  document.querySelector("#sceneRoot").appendChild(obj);

  elementos.push({
    id,
    type: "plane",
    src: "",
    position: { x:0, y:0, z:0 },
    scale: { x:1, y:1, z:1 }
  });

  renderLista();
}

// 📋 Lista UI
function renderLista() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  elementos.forEach(el => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerText = el.id;

    div.onclick = () => seleccionar(el.id);

    lista.appendChild(div);
  });
}

// 🎯 Seleccionar
function seleccionar(id) {
  seleccionado = elementos.find(e => e.id === id);

  document.getElementById("posX").value = seleccionado.position.x;
  document.getElementById("posY").value = seleccionado.position.y;
  document.getElementById("posZ").value = seleccionado.position.z;
  document.getElementById("scale").value = seleccionado.scale.x;
}

// ⚙️ Aplicar cambios
function aplicar() {
  if (!seleccionado) return;

  const x = parseFloat(posX.value);
  const y = parseFloat(posY.value);
  const z = parseFloat(posZ.value);
  const s = parseFloat(scale.value);

  seleccionado.position = { x, y, z };
  seleccionado.scale = { x:s, y:s, z:s };

  const obj = document.getElementById(seleccionado.id);

  obj.setAttribute("position", `${x} ${y} ${z}`);
  obj.setAttribute("scale", `${s} ${s} ${s}`);
}

// 💾 Guardar JSON
function guardar() {
  const data = JSON.stringify(elementos, null, 2);

  console.log(data);

  alert("JSON generado en consola (F12)");
}

</script>

</body>
</html>
