<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Editor AR Pro</title>

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <style>
        body {
            margin: 0;
            display: grid;
            grid-template-columns: 260px 1fr 260px;
            height: 100vh;
            font-family: sans-serif;
            background: #111;
            color: white;
        }

        #left,
        #right {
            background: #1a1a1a;
            padding: 12px;
            overflow: auto;
        }

        #center {
            background: #000;
        }

        .item {
            padding: 8px;
            border-bottom: 1px solid #333;
            cursor: pointer;
        }

        .item:hover {
            background: #333;
        }

        .active {
            background: #555;
        }

        input {
            width: 80px;
            margin: 4px;
        }

        button {
            margin-top: 6px;
            padding: 8px;
            width: 100%;
            background: #333;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #555;
        }
    </style>
</head>

<body>

<!-- IZQUIERDA -->
<div id="left">

    <h3>🖼 Imagen base</h3>
    <input type="file" id="imgBase">

    <h3>🎞 Galería</h3>
    <div id="galeria"></div>

    <button onclick="crearElemento()">➕ Crear elemento</button>

    <h3>📦 Elementos</h3>
    <div id="lista"></div>

</div>

<!-- CENTRO -->
<div id="center">

    <a-scene embedded cursor="rayOrigin: mouse"
        raycaster="objects: .draggable"
        renderer="colorManagement: true">

        <a-assets id="assets"></a-assets>

        <a-camera position="0 0 3"></a-camera>

        <a-plane id="mural" width="2" height="1.2" position="0 0 0"></a-plane>

        <a-entity id="root"></a-entity>

    </a-scene>

</div>

<!-- DERECHA -->
<div id="right">

    <h3>⚙️ Propiedades</h3>

    X <input id="posX" type="number" step="0.1"><br>
    Y <input id="posY" type="number" step="0.1"><br>
    Z <input id="posZ" type="number" step="0.01"><br>

    <hr>

    Escala X <input id="scaleX" type="number" step="0.1"><br>
    Escala Y <input id="scaleY" type="number" step="0.1"><br>
    Escala Z <input id="scaleZ" type="number" step="0.1"><br>

    <button onclick="aplicar()">Aplicar cambios</button>
    <button onclick="eliminar()">🗑 Eliminar objeto</button>
    <button onclick="guardar()">💾 Exportar JSON</button>

</div>

<script>

let elementos = [];
let seleccionado = null;
let contador = 0;
let assetSeleccionado = null;

// ===== GALERÍA =====
async function cargarGaleria() {
    const res = await fetch("assets.json");
    const assets = await res.json();

    const cont = document.getElementById("galeria");
    cont.innerHTML = "";

    assets.forEach(a => {
        const div = document.createElement("div");
        div.className = "item";
        div.innerText = a.name;

        div.onclick = () => {
            assetSeleccionado = a;
            document.querySelectorAll("#galeria .item")
                .forEach(el => el.classList.remove("active"));
            div.classList.add("active");
        };

        cont.appendChild(div);
    });
}

cargarGaleria();

// ===== CREAR =====
function crearElemento() {

    if (!assetSeleccionado) {
        alert("Selecciona un asset");
        return;
    }

    const id = "obj" + contador++;
    const assetId = "asset_" + assetSeleccionado.name.replace(/\W/g, "_");

    if (!document.getElementById(assetId)) {
        const el = document.createElement(
            assetSeleccionado.type === "video" ? "video" : "img"
        );

        el.src = "./assets/" + assetSeleccionado.name;
        el.id = assetId;
        el.loop = true;
        el.muted = true;
        el.autoplay = true;
        el.playsInline = true;

        document.getElementById("assets").appendChild(el);
    }

    const obj = document.createElement(
        assetSeleccionado.type === "video" ? "a-video" : "a-image"
    );

    obj.setAttribute("src", "#" + assetId);
    obj.setAttribute("position", "0 0 0.01");
    obj.setAttribute("scale", "1 1 1");
    obj.classList.add("draggable");
    obj.id = id;

    document.getElementById("root").appendChild(obj);

    elementos.push({
        id,
        asset: assetSeleccionado.name,
        position: { x: 0, y: 0, z: 0.01 },
        scale: { x: 1, y: 1, z: 1 }
    });

    renderLista();
}

// ===== LISTA =====
function renderLista() {
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    elementos.forEach(el => {
        const div = document.createElement("div");
        div.className = "item";
        div.innerText = el.id;

        if (seleccionado?.id === el.id) {
            div.classList.add("active");
        }

        div.onclick = () => seleccionar(el.id);

        lista.appendChild(div);
    });
}

// ===== SELECCIÓN =====
function seleccionar(id) {

    seleccionado = elementos.find(e => e.id === id);

    if (!seleccionado) return;

    posX.value = seleccionado.position.x;
    posY.value = seleccionado.position.y;
    posZ.value = seleccionado.position.z;

    scaleX.value = seleccionado.scale.x;
    scaleY.value = seleccionado.scale.y;
    scaleZ.value = seleccionado.scale.z;

    renderLista();
}

// ===== APLICAR =====
function aplicar() {

    if (!seleccionado) return;

    const x = parseFloat(posX.value);
    const y = parseFloat(posY.value);
    const z = parseFloat(posZ.value);

    const sx = parseFloat(scaleX.value);
    const sy = parseFloat(scaleY.value);
    const sz = parseFloat(scaleZ.value);

    seleccionado.position = { x, y, z };
    seleccionado.scale = { x: sx, y: sy, z: sz };

    const obj = document.getElementById(seleccionado.id);

    obj.setAttribute("position", `${x} ${y} ${z}`);
    obj.setAttribute("scale", `${sx} ${sy} ${sz}`);
}

// ===== ELIMINAR =====
function eliminar() {

    if (!seleccionado) return;

    document.getElementById(seleccionado.id)?.remove();

    elementos = elementos.filter(e => e.id !== seleccionado.id);

    seleccionado = null;

    posX.value = "";
    posY.value = "";
    posZ.value = "";
    scaleX.value = "";
    scaleY.value = "";
    scaleZ.value = "";

    renderLista();
}

// ===== EXPORTAR =====
function guardar() {

    const blob = new Blob([JSON.stringify({ elementos }, null, 2)], {
        type: "application/json"
    });

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "escena.json";
    a.click();
}

// ===== DRAG SIMPLE =====
document.addEventListener("mousedown", (e) => {
    if (e.target.classList.contains("draggable")) {
        seleccionar(e.target.id);
    }
});

</script>

</body>
</html>
