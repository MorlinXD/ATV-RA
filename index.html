<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR Murales</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://unpkg.com/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #debug {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: #00ffcc;
      padding: 8px 16px;
      border-radius: 10px;
      font-family: monospace;
      z-index: 999;
    }

    #msg {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-family: sans-serif;
      z-index: 999;
    }
  </style>
</head>

<body>

  <div id="msg">📷 Apunta al mural</div>
  <div id="debug">Estado: iniciando...</div>

  <a-scene mindar-image="
      imageTargetSrc: ./assets/teclado.mind;
      autoStart: true;
      uiLoading: yes;
      uiScanning: yes;
    " vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

    <a-assets id="assets"></a-assets>

    <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="target">
      <a-entity id="root" visible="false"></a-entity>
    </a-entity>

  </a-scene>
  <script>
    AFRAME.registerShader('chromakey', {
      schema: {
        src: { type: 'map' },
        color: { default: { x: 0.0, y: 1.0, z: 0.0 } },
        similarity: { default: 0.4 },
        smoothness: { default: 0.1 }
      },
      init: function (data) {
        this.material = new THREE.ShaderMaterial({
          uniforms: {
            map: { value: data.src },
            color: { value: new THREE.Vector3(data.color.x, data.color.y, data.color.z) },
            similarity: { value: data.similarity },
            smoothness: { value: data.smoothness }
          },
          vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
        }
      `,
          fragmentShader: `
        uniform sampler2D map;
        varying vec2 vUv;
        void main() {
          gl_FragColor = texture2D(map, vUv);
        }
      `,
          transparent: true
        });
      }
    });

    const debug = document.getElementById("debug");
    const target = document.getElementById("target");
    const root = document.getElementById("root");

    // ===== TRACKING =====
    target.addEventListener("targetFound", () => {
      debug.innerText = "✅ Detectado";
      root.setAttribute("visible", true);

      document.querySelectorAll("video").forEach(v => {
        v.play().catch(() => { });
      });
    });

    target.addEventListener("targetLost", () => {
      debug.innerText = "❌ Perdido";
      root.setAttribute("visible", false);
    });

    // ===== CARGA DE ESCENA =====
    async function cargarEscena() {

      try {
        debug.innerText = "📦 Cargando escena...";

        const res = await fetch("escena.json");

        if (!res.ok) {
          debug.innerText = "❌ ERROR JSON";
          console.error("No se pudo cargar escena.json");
          return;
        }

        const data = await res.json();

        debug.innerText = "✅ JSON cargado";

        const assets = document.getElementById("assets");

        for (const el of data.elementos) {

          console.log("Cargando:", el.asset);

          const id = "asset_" + el.asset.replace(/\W/g, "_");

          let a;

          if (el.asset.match(/\.(mp4|webm|mov)$/i)) {

            a = document.createElement("video");
            a.src = "assets/" + el.asset;
            a.id = id;

            a.loop = true;
            a.muted = true;
            a.autoplay = true;
            a.playsInline = true;
            a.setAttribute("webkit-playsinline", "true");

            a.addEventListener("error", () => {
              console.error("Error cargando video:", el.asset);
            });

          } else {

            a = document.createElement("img");
            a.src = "assets/" + el.asset;
            a.id = id;

            a.onload = () => console.log("Imagen OK:", el.asset);
            a.onerror = () => console.error("Error imagen:", el.asset);
          }

          assets.appendChild(a);

          // ===== OBJETO =====
          const obj = document.createElement("a-plane");

          obj.setAttribute("width", "1");
          obj.setAttribute("height", "0.6");

          // 🔥 DEBUG: SIN CHROMA KEY
          obj.setAttribute("material", `
        shader: flat;
        src: #${id};
        side: double;
      `);

          obj.setAttribute("position",
            `${el.position.x} ${el.position.y} ${el.position.z}`
          );

          obj.setAttribute("scale",
            `${el.scale.x} ${el.scale.y} ${el.scale.z}`
          );

          root.appendChild(obj);
        }

        debug.innerText = "🎯 Escena lista";

      } catch (e) {
        console.error(e);
        debug.innerText = "💥 ERROR GENERAL";
      }
    }

    cargarEscena();
  </script>
</body>

</html>
