<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AR Murales</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://unpkg.com/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

<style>
body { margin:0; }

#msg {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 10px 20px;
  border-radius: 20px;
  font-family: sans-serif;
}

#debug {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  color: #00ffcc;
  padding: 8px 16px;
  border-radius: 10px;
  font-family: monospace;
  font-size: 14px;
  z-index: 999;
}
</style>
</head>

<body>

<div id="msg">📷 Apunta al mural</div>
<div id="debug">Estado: iniciando...</div>

<a-scene
  mindar-image="
    imageTargetSrc: ./assets/prueba_porto.mind;
    autoStart: true;
    filterMinCF: 0.0001;
    filterBeta: 0.001;
  "
  renderer="colorManagement: true; physicallyCorrectLights: false;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

<a-assets id="assets"></a-assets>

<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

<a-entity mindar-image-target="targetIndex: 0" id="root" visible="false"></a-entity>

</a-scene>

<script>

// ===== DEBUG TRACKING =====
const target = document.querySelector('[mindar-image-target]');
const debug = document.getElementById("debug");

target.addEventListener("targetFound", () => {
  debug.innerText = "✅ Detectado";
  target.setAttribute("visible", true);

  document.querySelectorAll("video").forEach(v => {
    try {
      v.currentTime = 0;
      v.play();
    } catch(e){}
  });
});

target.addEventListener("targetLost", () => {
  debug.innerText = "❌ Perdido";
  target.setAttribute("visible", false);

  document.querySelectorAll("video").forEach(v => v.pause());
});


// ===== CARGAR ESCENA =====
async function cargarEscena() {

  try {

    const res = await fetch("escena.json");
    const data = await res.json();

    const root = document.getElementById("root");
    const assets = document.getElementById("assets");

    root.innerHTML = "";

    for (const el of data.elementos) {

      const assetId = "asset_" + el.asset.replace(/\W/g, "_");

      // ===== CREAR ASSET =====
      if (!document.getElementById(assetId)) {

        let assetEl;

        if (el.asset.match(/\.(mp4|webm)$/)) {

          assetEl = document.createElement("video");
          assetEl.src = "assets/" + el.asset;
          assetEl.id = assetId;

          assetEl.muted = true;
          assetEl.autoplay = true;
          assetEl.loop = true;
          assetEl.setAttribute("playsinline", "");
          assetEl.setAttribute("webkit-playsinline", "");
          assetEl.crossOrigin = "anonymous";
          assetEl.preload = "auto";

          assetEl.addEventListener("loadeddata", () => {
            assetEl.play().catch(()=>{});
          });

        } else {

          assetEl = document.createElement("img");
          assetEl.src = "assets/" + el.asset;
          assetEl.id = assetId;

        }

        assets.appendChild(assetEl);
      }

      // ===== CREAR OBJETO (FIX REAL) =====
      let obj = document.createElement("a-plane");

      obj.setAttribute("width", "1");
      obj.setAttribute("height", "0.6");

      obj.setAttribute("material", `
        shader: flat;
        src: #${assetId};
        side: double;
        transparent: true;
      `);

      // posición visible
      obj.setAttribute("position", "0 0 0.3");
      obj.setAttribute("scale", "2 2 2");

      root.appendChild(obj);
    }

  } catch (err) {
    console.error(err);
    debug.innerText = "❌ Error cargando escena";
  }
}

cargarEscena();

</script>

</body>
</html>
