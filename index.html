<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AR Murales</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://unpkg.com/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

<style>
body { margin:0; overflow:hidden; }

#debug {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  color: #00ffcc;
  padding: 8px 16px;
  border-radius: 10px;
  font-family: monospace;
  z-index: 999;
}

#msg {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 10px 20px;
  border-radius: 20px;
  font-family: sans-serif;
  z-index: 999;
}
</style>
</head>

<body>

<div id="msg">📷 Apunta al mural</div>
<div id="debug">Estado: iniciando...</div>

<a-scene
  mindar-image="
    imageTargetSrc: ./assets/prueba_porto.mind;
    autoStart: true;
    uiLoading: yes;
    uiScanning: yes;
  "
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

<a-assets id="assets"></a-assets>

<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

<!-- IMPORTANTE: NO ocultar el target -->
<a-entity mindar-image-target="targetIndex: 0" id="target">

  <!-- SOLO ESTE SE OCULTA -->
  <a-entity id="root"></a-entity>

</a-entity>

</a-scene>

<script>

const debug = document.getElementById("debug");
const target = document.getElementById("target");
const root = document.getElementById("root");

target.addEventListener("targetFound", () => {
  debug.innerText = "✅ Detectado";

  // SOLO mostrar contenido
  root.setAttribute("visible", true);

  document.querySelectorAll("video").forEach(v => {
    v.play().catch(()=>{});
  });

});

target.addEventListener("targetLost", () => {
  debug.innerText = "❌ Perdido";

  // 🔥 SOLO ocultar contenido, NO el target
  root.setAttribute("visible", false);

  document.querySelectorAll("video").forEach(v => {
    v.pause();
  });

});

async function cargarEscena() {

  const res = await fetch("escena.json");
  const data = await res.json();

  const assets = document.getElementById("assets");

  for (const el of data.elementos) {

    const id = "asset_" + el.asset.replace(/\W/g, "_");

    if (!document.getElementById(id)) {

      let a;

      if (el.asset.match(/\.(mp4|webm)$/)) {

        a = document.createElement("video");
        a.src = "assets/" + el.asset;
        a.id = id;
        a.loop = true;
        a.muted = true;
        a.playsInline = true;
        a.autoplay = true;

      } else {

        a = document.createElement("img");
        a.src = "assets/" + el.asset;
        a.id = id;

      }

      assets.appendChild(a);
    }

    const obj = document.createElement("a-plane");

    obj.setAttribute("width", "1");
    obj.setAttribute("height", "0.6");

    obj.setAttribute("material", `
      shader: flat;
      src: #${id};
      transparent: true;
      side: double;
    `);

    obj.setAttribute("position",
      `${el.position.x} ${el.position.y} ${el.position.z}`
    );

    obj.setAttribute("scale",
      `${el.scale.x} ${el.scale.y} ${el.scale.z}`
    );

    root.appendChild(obj);
  }
}

cargarEscena();

</script>

</body>
</html>
